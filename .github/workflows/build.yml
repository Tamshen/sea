name: Build and Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build

      - name: Push build to build branch
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r dist /tmp/dist-build
          cd /tmp

          git clone --branch build --single-branch https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git build-repo 2>/dev/null || \
            git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git build-repo

          cd build-repo
          git checkout --orphan build-new
          git rm -rf . || true

          cp -a /tmp/dist-build/. ./

          git add .
          git commit -m "build: update from ${COMMIT_SHA}" || echo "No changes"
          git push origin build-new:build --force

