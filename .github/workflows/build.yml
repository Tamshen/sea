name: Build and Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build

      - name: Push build to build branch
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mv dist /tmp/dist-build

          git fetch origin build || true
          if git ls-remote --heads origin build | grep -q build; then
            git checkout -B build origin/build
            git rm -rf .
          else
            git checkout --orphan build
            git rm -rf . || true
          fi

          cp -a /tmp/dist-build/. ./
          rm -rf /tmp/dist-build

          git add .
          git commit -m "build: update from ${COMMIT_SHA}" || echo "No changes"
          git push origin build
